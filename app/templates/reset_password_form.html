{% extends "base.html" %}
{% block title %}Nouveau mot de passe – Avicenne Pay{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card shadow-lg border-0 rounded-4" style="max-width: 450px; width: 100%;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Nouveau mot de passe</h2>
                <p class="text-muted">Choisissez un mot de passe sécurisé.</p>
            </div>

            {% if error %}
            <div class="alert alert-danger small">{{ error }}</div>
            {% endif %}

            <form method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold small">Nouveau mot de passe</label>
                    <input type="password" name="new_password" class="form-control" required minlength="8">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold small">Confirmer le mot de passe</label>
                    <input type="password" name="confirm_password" class="form-control" required minlength="8">
                </div>
                <button type="submit" class="btn btn-dark w-100 btn-lg fw-bold shadow-sm">
                    Mettre à jour
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
