{% extends "base.html" %}
{% block title %}Configuration initiale – Avicenne Pay{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4">
                <h2 class="card-title mb-4">
                    <i class="bi bi-shield-lock text-primary"></i> Création du compte Admin
                </h2>
                <p class="text-muted">Cette page n'est accessible que si aucun administrateur n'existe encore.</p>
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="post" action="/setup">
                    <div class="mb-3">
                        <label class="form-label">Email administrateur</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mot de passe</label>
                        <input type="password" name="password" class="form-control" required minlength="8">
                    </div>
                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-person-plus"></i> Créer le compte admin
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
